<div class="container my-5 px-3 px-md-0">
    <div class="card shadow-sm border-0">
        <div class="card-header bg-primary text-white p-3">
            <h2 class="h4 mb-0 text-center"><i class="fa fa-users me-2"></i>User Management</h2>
        </div>
        
        <div class="card-body p-0">
            <!-- Desktop -->
            <div class="d-none d-md-block">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4">Email</th>
                            <th>Role</th>
                            <th class="text-end pe-4">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let user of users">
                            <td class="ps-4"><strong>{{ user.email }}</strong></td>
                            <td>
                                <span class="badge rounded-pill" 
                                      [ngClass]="user.role === 'ADMIN' ? 'bg-danger' : 'bg-info text-dark'">
                                    {{ user.role }}
                                </span>
                            </td>
                            <td class="text-end pe-4">
                                <div class="d-inline-flex gap-2">
                                    <select class="form-select form-select-sm role-select" [(ngModel)]="user['newRole']">
                                        <option value="USER">User</option>
                                        <option value="ADMIN">Admin</option>
                                    </select>
                                    <button class="btn btn-primary btn-sm" (click)="updateRole(user.id, user.newRole!)">Update</button>
                                    <button class="btn btn-outline-danger btn-sm" (click)="deleteUser(user.id)">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Mobile -->
            <div class="d-block d-md-none">
                <div *ngFor="let user of users" class="p-3 border-bottom mobile-user-row">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <div class="fw-bold text-truncate" style="max-width: 70%;">{{ user.email }}</div>
                        <span class="badge rounded-pill" [ngClass]="user.role === 'ADMIN' ? 'bg-danger' : 'bg-info text-dark'">
                            {{ user.role }}
                        </span>
                    </div>
                    
                    <div class="d-flex gap-2 align-items-center mt-3">
                        <select class="form-select form-select-sm" [(ngModel)]="user['newRole']">
                            <option value="USER">User</option>
                            <option value="ADMIN">Admin</option>
                        </select>
                        <button class="btn btn-primary btn-sm flex-grow-1" (click)="updateRole(user.id, user.newRole!)">Update</button>
                        <button class="btn btn-outline-danger btn-sm" (click)="deleteUser(user.id)">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
