<header class="sticky-top p-0">
    <nav class="navbar navbar-expand-lg navbar-light custom-nav">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#appNavbar"
                (click)="navbarCollapsed = !navbarCollapsed" [attr.aria-expanded]="!navbarCollapsed"
                aria-controls="navbarToggler" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="appNavbar">
                <div class="d-lg-flex flex-column w-100">

                    <!-- Top row -->
                    <div class="d-lg-flex align-items-center w-100 main-row">
                        <ul class="navbar-nav">
                            <li class="nav-item" *ngFor="let item of headerItems">
                                <a class="nav-link menu-btn" [routerLink]="item.link" routerLinkActive="active-link"
                                    [routerLinkActiveOptions]="{exact: true}" class="nav-link menu-btn"
                                    data-bs-toggle="collapse" data-bs-target=".navbar-collapse.show">
                                    {{item.caption}}
                                </a>
                            </li>
                        </ul>

                        <div class="ms-auto"></div>

                        <div class="ms-auto d-none d-lg-block px-3" *ngIf="isLoggedIn">
                            Hello, {{getFirstName()}} <span *ngIf="isAdmin">(ADMIN)</span>
                        </div>

                        <ul class="navbar-nav">
                            <ng-container *ngIf="!isLoggedIn">
                                <li class="nav-item" *ngFor="let item of unAuthItems">
                                    <a class="nav-link menu-btn" [routerLink]="item.link" routerLinkActive="active-link"
                                        data-bs-toggle="collapse"
                                        data-bs-target=".navbar-collapse.show">{{item.caption}}
                                    </a>
                                </li>
                            </ng-container>
                            <ng-container *ngIf="isLoggedIn">
                                <li class="nav-item" *ngFor="let item of authItems">
                                    <a class="nav-link menu-btn" [routerLink]="item.link" routerLinkActive="active-link"
                                        data-bs-toggle="collapse"
                                        data-bs-target=".navbar-collapse.show">{{item.caption}}
                                    </a>
                                </li>
                            </ng-container>
                        </ul>
                    </div>

                    <!-- Category row -->
                    <div *ngIf="showProductNav" class="d-lg-flex align-items-center w-100 product-row">
                        <ul class="navbar-nav me-auto">
                            <li class="nav-item" *ngFor="let category of categories">
                                <a class="nav-link cat-link" [routerLink]="['/products', category]"
                                    routerLinkActive="active-link" data-bs-toggle="collapse"
                                    data-bs-target=".navbar-collapse.show">
                                    {{category}}
                                </a>
                            </li>
                        </ul>
                        <ul class="navbar-nav">
                            <li *ngIf="isAdmin" class="nav-item">
                                <a class="nav-link menu-btn secondary" routerLink="/products/add-new"
                                    routerLinkActive="active-link" data-bs-toggle="collapse"
                                    data-bs-target=".navbar-collapse.show">Add New Product</a>
                            </li>
                            <li *ngIf="!isAdmin" class="nav-item">
                                <a class="nav-link menu-btn secondary" routerLink="/basket/view"
                                    routerLinkActive="active-link" data-bs-toggle="collapse"
                                    data-bs-target=".navbar-collapse.show">
                                    <i class="fa fa-shopping-basket"></i> Basket
                                </a>
                            </li>
                        </ul>
                    </div>

                </div>
            </div>
        </div>
    </nav>
</header>
